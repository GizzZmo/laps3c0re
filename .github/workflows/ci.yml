name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build (PS4)
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2dev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install git (container dependency)
        run: |
          set -e
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates

      - name: Clone mast1c0re SDK
        run: |
          git clone --depth=1 https://github.com/McCaulay/mast1c0re.git /opt/mast1c0re

      - name: Build all PS4 firmware variants
        env:
          MAST1C0RE: /opt/mast1c0re
        run: |
          set -euo pipefail
          mapfile -t PS4_FW_VERSIONS < <(
            grep -Eo '"([0-9]{1,2}\.[0-9]{2})"' build.sh \
              | tr -d '"' \
              | awk '!seen[$0]++'
          )
          if [ "${#PS4_FW_VERSIONS[@]}" -eq 0 ]; then
            echo "No PS4 firmware versions found in build.sh" >&2
            exit 1
          fi
          for fw in "${PS4_FW_VERSIONS[@]}"; do
            echo "::group::Building PS4 $fw"
            make clean
            make SYSTEM=PS4 FIRMWARE="$fw" EBOOT_VERSION=1.01 MAST1C0RE=/opt/mast1c0re
            echo "::endgroup::"
          done

      - name: Upload ELF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: laps3c0re-elfs
          path: bin/PS4-*/laps3c0re-*.elf
          if-no-files-found: error
          retention-days: 30

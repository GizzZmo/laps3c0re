name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build (PS4)
    runs-on: ubuntu-latest
    container:
      # Pinned to an immutable digest (ps2dev/ps2dev:latest @ 2026-04-25); update intentionally.
      image: ps2dev/ps2dev@sha256:51abeb3ee8d7a6c227a8727544967632afbade7c12d0ddf42fdac671e5f5c5ac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies (container)
        run: |
          set -e
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends \
              git ca-certificates make build-essential
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache git ca-certificates make build-base
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y git ca-certificates make gcc gcc-c++
          elif command -v yum >/dev/null 2>&1; then
            yum install -y git ca-certificates make gcc gcc-c++
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Sy --noconfirm git ca-certificates make base-devel
          else
            echo "No supported package manager found in container; cannot install dependencies." >&2
            exit 1
          fi

      - name: Clone mast1c0re SDK
        run: |
          git clone --depth=1 https://github.com/McCaulay/mast1c0re.git /opt/mast1c0re

      - name: Build all PS4 firmware variants
        env:
          MAST1C0RE: /opt/mast1c0re
        shell: sh
        run: |
          set -eu

          command -v make >/dev/null 2>&1 || { echo "make is missing in the container" >&2; exit 1; }

          grep -Eo '"([0-9]{1,2}\.[0-9]{2})"' build.sh | tr -d '"' | awk '!seen[$0]++' > /tmp/fw_versions.txt

          if [ ! -s /tmp/fw_versions.txt ]; then
            echo "No PS4 firmware versions found in build.sh" >&2
            exit 1
          fi

          while IFS= read -r fw; do
            echo "::group::Building PS4 $fw"
            make clean
            make SYSTEM=PS4 FIRMWARE="$fw" EBOOT_VERSION=1.01 MAST1C0RE=/opt/mast1c0re
            echo "::endgroup::"
          done < /tmp/fw_versions.txt

      - name: Upload ELF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: laps3c0re-elfs
          path: bin/PS4-*/laps3c0re-*.elf
          if-no-files-found: error
          retention-days: 30

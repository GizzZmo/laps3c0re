name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build (PS4)
    runs-on: ubuntu-latest
    container:
      # Pinned to an immutable digest (ps2dev/ps2dev:latest @ 2026-04-25); update intentionally.
      image: ps2dev/ps2dev@sha256:51abeb3ee8d7a6c227a8727544967632afbade7c12d0ddf42fdac671e5f5c5ac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies (container)
        run: |
          set -e
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends \
              git ca-certificates make build-essential
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache git ca-certificates make build-base
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y git ca-certificates make gcc gcc-c++
          elif command -v yum >/dev/null 2>&1; then
            yum install -y git ca-certificates make gcc gcc-c++
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Sy --noconfirm git ca-certificates make base-devel
          else
            echo "No supported package manager found in container; cannot install dependencies." >&2
            exit 1
          fi

      - name: Clone mast1c0re SDK
        run: |
          # Pinned to a known-good commit that defines the LIBKERNEL macro and
          # LIB_KERNEL_* identifiers required by this project.  Update
          # intentionally when upgrading the SDK.
          git clone https://github.com/McCaulay/mast1c0re.git /opt/mast1c0re
          cd /opt/mast1c0re && git checkout 14a9276dc39bc42ba3e727f4deeb014d9459a755

      - name: Build all PS4 firmware variants
        env:
          MAST1C0RE: /opt/mast1c0re
        shell: sh
        run: |
          set -eu

          command -v make >/dev/null 2>&1 || { echo "make is missing in the container" >&2; exit 1; }

          # Only build the PS4 firmware variants that have libkernel offset
          # tables in the pinned mast1c0re SDK commit.  Variants not listed
          # here (e.g. 9.03, 9.04, 9.50, 10.00, 11.02, …) are not covered by
          # the SDK's sdk/include/offsets/ps/libkernel.hpp and would produce
          # "LIBKERNEL was not declared" compile errors.
          printf '9.00\n10.01\n10.50\n10.70\n10.71\n11.00\n' > /tmp/fw_versions.txt

          while IFS= read -r fw; do
            echo "::group::Building PS4 $fw"
            make clean
            make SYSTEM=PS4 FIRMWARE="$fw" EBOOT_VERSION=1.01 MAST1C0RE=/opt/mast1c0re
            echo "::endgroup::"
          done < /tmp/fw_versions.txt

      - name: Upload ELF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: laps3c0re-elfs
          path: bin/PS4-*/laps3c0re-*.elf
          if-no-files-found: error
          retention-days: 30

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2dev@sha256:REPLACE_WITH_APPROVED_PS2DEV_IMAGE_DIGEST

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install git (container dependency)
        run: |
          set -e
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates

      - name: Clone mast1c0re SDK
        run: |
          git clone --depth=1 https://github.com/McCaulay/mast1c0re.git /opt/mast1c0re

      - name: Build all PS4 firmware variants
        env:
          MAST1C0RE: /opt/mast1c0re
        run: |
          set -euo pipefail

          versions_source=""
          for candidate in build.sh .github/workflows/ci.yml .github/workflows/ci.yaml; do
            if [ -f "$candidate" ]; then
              versions_source="$candidate"
              break
            fi
          done

          if [ -z "$versions_source" ]; then
            echo "Unable to locate a shared firmware version source (build.sh or CI workflow)." >&2
            exit 1
          fi

          mapfile -t PS4_FW_VERSIONS < <(
            grep -oE '"[0-9]+\.[0-9]+"' "$versions_source" \
              | tr -d '"' \
              | awk '!seen[$0]++'
          )

          if [ "${#PS4_FW_VERSIONS[@]}" -eq 0 ]; then
            echo "No PS4 firmware versions found in $versions_source" >&2
            exit 1
          fi

          echo "Using firmware versions from $versions_source: ${PS4_FW_VERSIONS[*]}"
          for fw in "${PS4_FW_VERSIONS[@]}"; do
            echo "::group::Building PS4 $fw"
            make clean
            make SYSTEM=PS4 FIRMWARE="$fw" EBOOT_VERSION=1.01 MAST1C0RE=/opt/mast1c0re
            echo "::endgroup::"
          done

      - name: Package ELF binaries per firmware
        run: |
          set -euo pipefail
          mkdir -p dist
          for dir in bin/PS4-*/; do
            fw=$(basename "$dir")
            zip -j "dist/${fw}.zip" "$dir"laps3c0re-*.elf
          done
          cp bin/NOTICE dist/NOTICE.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/NOTICE.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
